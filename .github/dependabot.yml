version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  groups:
    grouped-security-updates:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
  groups:
    grouped-security-updates:
      applies-to: security-updates
      patterns:
      - '*'
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  groups:
    grouped-security-updates:
      applies-to: security-updates
      patterns:
      - '*'
open-pull-requests-limit: 5
